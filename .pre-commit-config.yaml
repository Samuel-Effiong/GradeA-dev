repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
    -   id: check-yaml
    -   id: end-of-file-fixer
    -   id: trailing-whitespace
    -   id: check-ast
    -   id: check-docstring-first
    -   id: check-added-large-files
    -   id: check-merge-conflict
    -   id: check-toml
    -   id: check-json
    -   id: check-xml
    -   id: check-case-conflict
    -   id: check-builtin-literals
    -   id: fix-byte-order-marker
    -   id: detect-private-key
    -   id: name-tests-test
    -   id: debug-statements
    -   id: check-symlinks
    -   id: requirements-txt-fixer

-   repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
    -   id: black
        language_version: python3
        args: [--line-length=88]

-   repo: https://github.com/pre-commit/mirrors-mypy
    rev: 'v1.17.1'  # Use the sha / tag you want to point at
    hooks:
    -   id: mypy
        args: [--ignore-missing-imports, --check-untyped-defs, --disable-error-code=var-annotated]
        additional_dependencies: [types-requests,  types-redis, types-waitress]

-   repo: https://github.com/pycqa/flake8 # Linting with Flake8
    rev: 7.3.0
    hooks:
      - id: flake8
        language_version: python3
        additional_dependencies:
          - flake8-bugbear==23.7.10
          - flake8-comprehensions==3.12.0
          - flake8-docstrings==1.7.0
          - flake8-import-order==0.18.2
          - flake8-print==5.0.0
          - flake8-rst-docstrings==0.3.1
          - flake8-eradicate==1.5.0
        args:
          - --max-line-length=120                  # Matches Black's line length
          - --select=B,C,E,F,W,T4,B9                          # Enable common checks
          - --ignore=W503,E800      # Align with Black formatting
        exclude: ^migrations/
    # Sort imports automatically with isort
-   repo: https://github.com/pre-commit/mirrors-isort
    rev: v5.10.1
    hooks:
    -   id: isort                       # Ensure imports are sorted
        args: [--profile=black]         # Align with Black's rules
# -   repo: local
#     hooks:
#     -   id: run-tests
#         name: Run test before commit
#         entry: pytest
#         language: system
#         pass_filenames: false
#         always_run: true
 # Security checks - Bandit
-   repo: https://github.com/PyCQA/bandit
    rev: 1.8.6
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml"]
        exclude: "tests/|examples/|docs/|setup.py"

  # Check for secrets in code
-   repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: 'tests/|examples/|docs/'
